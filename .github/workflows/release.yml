name: Release

# Two ways to cut a release:
#   1. push a version tag:   git tag v0.1.0 && git push origin v0.1.0
#   2. Actions tab -> Release -> "Run workflow", enter a version (v0.1.0)
# Both build the QEMU bundle and publish it as a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0), must match the VERSION file"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install QEMU and Minix tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-misc util-linux python3

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add riscv64gc-unknown-none-elf

      - name: Verify tag matches VERSION file
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          tag="${tag#v}"
          file="$(cat VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "Tag v$tag does not match VERSION ($file)"; exit 1
          fi

      - name: Boot test (release must be green)
        run: make test

      - name: Build release bundle
        run: make release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: LightOS ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/lightos-*.tar.gz
            dist/lightos-*.tar.gz.sha256
